<div class="flex flex-col gap-[24px]">
  <z-carousel [zOptions]="zardCarouselOptions" zControls="none">
    <z-carousel-content>

      @for (maker of makers; track maker.id; let i = $index) {
        <z-carousel-item class="!basis-auto">
          <woodia-maker-card [maker]="maker" />
        </z-carousel-item>

      }
    </z-carousel-content>
  </z-carousel>

  <div class="flex flex-col gap-[24px] items-center">
    <!-- Header -->
    <div class="flex flex-col items-center text-center max-w-[720px]">
      <h1 class="font-h1">
        Become a maker
      </h1>

      <span class="font-caption text-black/60">
        Have a talent or love making furniture? Join our elite force and
        showcase your skills and connect with clients who value custom craftsmanship.
      </span>
    </div>

    <!-- CTA Button -->
    <z-button size="lg" class="px-8" (click)="navigateToAuth()">
      Join Now
    </z-button>
  </div>
</div>

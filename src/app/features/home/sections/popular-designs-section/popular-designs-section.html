<div class="flex flex-col gap-[16px] items-center">
  <div>
    <h1 class="font-h1">
      Our Most Loved Designs
    </h1>
  </div>
  
  <div class="w-full">
    <z-carousel [zOptions]="zardCarouselOptions" zControls="none">
      <z-carousel-content>
        @for (product of products; track product.id) {
          <z-carousel-item class="basis-auto flex-shrink-0">
            <woodia-product-card
              [product]="product"
            ></woodia-product-card>
          </z-carousel-item>
        }
      </z-carousel-content>
    </z-carousel>
  </div>
</div>

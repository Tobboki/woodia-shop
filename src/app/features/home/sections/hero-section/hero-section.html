<div class="flex flex-col items-center gap-2">
  <!-- Header -->
  <h1
    class="uppercase font-h1 font-medium flex flex-col items-center gap-2 max-md:gap-0"
  >
    <div class="flex flex-row flex-wrap justify-center items-center gap-1">
      <span class="text-nowrap">Centuries Of</span>
      <div class="group relative inline-block max-md:hidden">
        <img
          src="/images/home/hero-hover-1.webp"
          alt="Craftsman"
          class="h-[48px] w-[128px] object-cover rounded-full border-2 border-foreground"
        />

        <!-- Expanded -->
        <div class="absolute left-1/2 top-1/2
                -translate-x-1/2 -translate-y-1/2
                h-[400px]
                aspect-[3183/4774]
                opacity-0 scale-75
                transition-all duration-500 ease-out
                group-hover:opacity-100 group-hover:scale-100
                z-50 pointer-events-none">
          <img
            src="/images/home/hero-hover-1.webp"
            alt="Craftsman Focus Img"
            class="w-full h-full object-cover rounded-2xl shadow-2xl border-2 border-foreground"
          />
        </div>
      </div>
      <span class="text-nowrap">Craftsmanship</span>
    </div>
    <div class="flex flex-row flex-wrap justify-center items-center gap-[8px]">
      <Span class="text-nowrap">Presented With</Span>
      <div class="group relative inline-block  max-md:hidden">
        <img
          src="/images/home/hero-hover-2.webp"
          alt="Modern Team Focus Img"
          class="h-[48px] w-[128px] object-cover rounded-full border-2 border-foreground"
        />

        <!-- Expanded -->
        <div class="absolute left-1/2 top-1/2
                -translate-x-1/2 -translate-y-1/2
                h-[400px]
                aspect-[3183/4774]
                opacity-0 scale-75
                transition-all duration-500 ease-out
                group-hover:opacity-100 group-hover:scale-100
                z-50 pointer-events-none">
          <img
            src="/images/home/hero-hover-2.webp"
            alt="Modern Team Img"
            class="w-full h-full object-cover rounded-2xl shadow-2xl border-2 border-foreground"
          />
        </div>
      </div>
      <span class="text-nowrap">Modernity</span>
    </div>
  </h1>

  <!-- Editor -->
  <div class="relative w-full max-w-[1200px] h-[600px] bg-muted/20 rounded-xl overflow-hidden shadow-2xl border">
    <woodia-design-configurator modelType="Bookcase" [product]="heroTestProduct" class="w-full h-full block" />
  </div>
</div>

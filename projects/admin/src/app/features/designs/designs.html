<div class="flex flex-col gap-6 p-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">Designs</h1>
      <p class="text-muted-foreground mt-1">Manage your design lines and models.</p>
    </div>
    <a z-button [routerLink]="['design-studio']" zType="default">
      <ng-icon name="lucidePlus" class="mr-2" />
      New Design
    </a>
  </div>

  <div class="bg-card rounded-lg border shadow-sm">
    <app-data-table [headers]="headers" [items]="items" emptyMessage="No designs found. Create one to get started."></app-data-table>
  </div>
</div>

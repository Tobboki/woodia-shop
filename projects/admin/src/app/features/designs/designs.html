<div class="p-4 h-full flex flex-col" *transloco="let t">
  <app-crud-server-data-table modelName="design" [headers]="headers" [items]="items()" [pagedResponse]="pagedResponse()"
    [loading]="loading()" [allowedOperations]="{ add: true, update: true, delete: true }" (addClicked)="onAddClicked()"
    (queryParamsChanged)="onQueryParamsChanged($event)" (deleteClicked)="onDelete($event)" (editClicked)="onEditClicked($event)">
    
    <ng-template #customActions let-item>
      <button z-button zType="ghost" zSize="sm" class="size-8 p-0"
        [zTooltip]="item.productStatus === 'Published' ? t('modules.designs.setAsDraft') : t('modules.designs.publish')"
        (click)="onStatusChange(item)">
        <ng-icon [name]="item.productStatus === 'Published' ? 'lucideEyeOff' : 'lucideSend'" 
          class="size-4" [class.text-amber-500]="item.productStatus === 'Published'" [class.text-green-500]="item.productStatus !== 'Published'"></ng-icon>
      </button>
    </ng-template>

  </app-crud-server-data-table>
</div>

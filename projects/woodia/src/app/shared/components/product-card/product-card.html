<a
  class="relative w-full h-full flex flex-col overflow-hidden group bg-card border border-border rounded-2xl hover:shadow-xl transition-all duration-300"
  [routerLink]="`/designs/model/${product.id}`"
>
  <!-- Image Section -->
  <div class="relative w-full aspect-square overflow-hidden bg-muted/50 shrink-0">
    <!-- Default Image -->
    <img
      [ngSrc]="isImagePath(product.thumbnailImage) ? product.thumbnailImage : '/images/placeholders/product-placeholder.png'"
      [alt]="product.productLine"
      fill
      priority
      class="object-cover transition-all duration-500 group-hover:scale-105"
      [class.group-hover:opacity-0]="isImagePath(product.hoverImage)"
    />

    <!-- Hover Image -->
    @if (isImagePath(product.hoverImage)) {
      <img
        [ngSrc]="product.hoverImage"
        [alt]="product.productLine"
        fill
        class="object-cover absolute inset-0 opacity-0 transition-all duration-500 group-hover:opacity-100 group-hover:scale-105"
      />
    }
  </div>

  <!-- Content -->
  <div class="flex flex-col gap-1.5 p-4 flex-grow">
    <h3 class="font-bold text-lg leading-tight select-none truncate" [dir]="getTextDir(product.productLine)">
      {{ product.productLine }}
    </h3>
    <p class="text-sm text-foreground/60 line-clamp-2 select-none min-h-[40px]" [dir]="getTextDir(product.description)">
      {{ product.description }}
    </p>
  </div>
</a>

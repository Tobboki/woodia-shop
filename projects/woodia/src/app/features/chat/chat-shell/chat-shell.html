<div class="flex h-[calc(100vh-124px)] bg-background rounded-2xl border border-border overflow-hidden shadow-sm"
    *transloco="let t; read: 'features.chat'">

    <!-- Connection banner -->
    @if ((connectionState$ | async) === 'connecting') {
    <div
        class="absolute top-0 left-0 right-0 z-50 flex items-center justify-center gap-2 py-1.5 bg-amber-500/90 text-white text-xs font-bold">
        <ng-icon name="lucideLoader" class="size-3.5 animate-spin" />
        {{ t('connecting') }}
    </div>
    }
    @if ((connectionState$ | async) === 'disconnected') {
    <div
        class="absolute top-0 left-0 right-0 z-50 flex items-center justify-center gap-2 py-1.5 bg-destructive/90 text-white text-xs font-bold">
        <ng-icon name="lucideWifiOff" class="size-3.5" />
        {{ t('disconnected') }}
    </div>
    }

    <!-- ── ROOMS SIDEBAR (always visible desktop, hidden on mobile when room open) ── -->
    <div class="w-80 shrink-0 border-r border-border/50 flex flex-col" [class.hidden]="showRoom()"
        [class.md:flex]="true" [class.flex]="!showRoom()">
        <woodia-chats-list (roomSelected)="onRoomSelected($event)" />
    </div>

    <!-- ── ROOM VIEW ── -->
    <div class="flex-1 flex flex-col min-w-0" [class.hidden]="!showRoom() && !selectedRoom()" [class.md:flex]="true"
        [class.flex]="showRoom() || !!selectedRoom()">

        @if (selectedRoom(); as room) {

        <!-- Mobile back button injected into room header via ng-content or overlay -->
        <div class="md:hidden flex items-center gap-2 px-3 pt-3 shrink-0">
            <button class="flex items-center gap-1.5 text-sm font-bold text-primary" (click)="backToList()">
                <ng-icon name="lucideArrowLeft" class="size-4" />
                {{ t('backToChats') }}
            </button>
        </div>

        <woodia-chat class="flex-1 min-h-0" [roomId]="room.roomId" [roomName]="room.name" [jobTitle]="room.jobTitle" />

        } @else {

        <!-- Empty / no room selected (desktop only) -->
        <div class="hidden md:flex flex-col items-center justify-center flex-1 gap-4 text-muted-foreground">
            <div class="p-8 rounded-full bg-muted/20">
                <ng-icon name="lucideMessageSquare" class="size-12 opacity-30" />
            </div>
            <div class="text-center space-y-1">
                <p class="font-bold text-foreground">{{ t('selectConversation') }}</p>
                <p class="text-sm">{{ t('selectConversationDesc') }}</p>
            </div>
        </div>

        }
    </div>

</div>

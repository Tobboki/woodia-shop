<section class="space-y-[24px]" *transloco="let t">
  <div>
    <h3 class="font-h3">
     {{ t('features.customers.settings.shippingDetails') }}
    </h3>

    <z-divider class="bg-black/25 mt-[8px]"></z-divider>
  </div>
  @if(shippingDetailsLoading()) {
    <div class="space-y-[24px] my-[40px]">
      <div class="grid grid-cols-2 max-sm:grid-cols-1 gap-[20px]">
        <div class="space-y-2">
            <z-skeleton class="h-5 w-[100px]" />
            <z-skeleton class="h-[48px] w-full" />
        </div>
        <div class="space-y-2">
            <z-skeleton class="h-5 w-[100px]" />
            <z-skeleton class="h-[48px] w-full" />
        </div>
      </div>
      <div class="space-y-2">
          <z-skeleton class="h-5 w-[100px]" />
          <z-skeleton class="h-[48px] w-full" />
      </div>
      <div class="space-y-2">
          <z-skeleton class="h-5 w-[100px]" />
          <z-skeleton class="h-[48px] w-full" />
      </div>
      <div class="flex flex-row justify-end gap-[12px]">
        <z-skeleton class="h-10 w-[80px]" />
        <z-skeleton class="h-10 w-[120px]" />
      </div>
    </div>
  }
  @else if (!haveShippingDetails()) {
    <button
      z-button
      type="button"
      (click)="handleAddDetails()"
    >
      {{ t('features.customers.settings.addDetails') }}
    </button>
  }
  @else {
    <div>
      <!-- Form -->
      <form [formGroup]="shippingForm" (ngSubmit)="handleShippingSubmit()" class="space-y-[24px] my-[40px]">
        <div class="grid grid-cols-2 max-sm:grid-cols-1 gap-[20px]">
          <!-- governorate Selector -->
          <z-form-field>
            <label class="font-label" z-form-label for="governorate">{{ t('features.customers.settings.governorate') }}</label>
            <z-form-control>
              <z-select id="governorate" formControlName="governorate" [zPlaceholder]="'features.customers.settings.governoratePlaceholder' | transloco">
                @for (Governorate of Governorates(); track Governorate) {
                  <z-select-item [zValue]="Governorate.id.toString()">{{ Governorate.nameEn }}</z-select-item>
                }
              </z-select>
            </z-form-control>
          </z-form-field>

          <z-form-field>
            <label class="font-label" z-form-label>
              {{ t('features.customers.settings.phone') }}
            </label>
            <z-form-control>
              <input
                z-input
                type="text"
                [placeholder]="t('features.customers.settings.phonePlaceholder')"
                formControlName="phone"
              />
            </z-form-control>
          </z-form-field>
        </div>

        <z-form-field>
          <label class="font-label" z-form-label>
            {{ t('features.customers.settings.addressLine') }}
          </label>
          <z-form-control>
            <input
              z-input
              type="text"
              [placeholder]="t('features.customers.settings.addressLinePlaceholder')"
              formControlName="addressLine"
            />
          </z-form-control>
        </z-form-field>

        <z-form-field>
          <label class="font-label" z-form-label>
            {{ t('features.customers.settings.additionalDetails') }}
          </label>
          <z-form-control>
            <input
              z-input
              type="text"
              [placeholder]="t('features.customers.settings.additionalDetailsPlaceholder')"
              formControlName="additionalDetails"
            />
          </z-form-control>
        </z-form-field>

        <div class="flex flex-row justify-end gap-[12px]">
          <button
            z-button
            zType="outline"
            type="button"
            [disabled]="!shippingForm.dirty || shippingDetailsFormLoading()"
          >
            {{ t('features.customers.settings.reset') }}
          </button>
          <button
            z-button
            zType="default"
            type="submit"
            [disabled]="shippingForm.invalid"
            [zLoading]="shippingDetailsFormLoading()"
          >
            {{ t('features.customers.settings.saveChanges') }}
          </button>
        </div>
      </form>
    </div>
  }
</section>

<div class="jobs-grid p-4">

  <!-- Empty State -->
  @if (jobs.length !>= 0) {
    <div class="flex flex-col items-center justify-center py-20 text-center">
      <div class="text-5xl mb-4">📭</div>
      <h2 class="text-xl font-semibold text-gray-700">No jobs found</h2>
      <p class="text-gray-500 mt-2">Try creating a new job or adjusting filters</p>
    </div>
  }

  <!-- Grid of jobs -->
  @if (jobs.length > 0) {
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

      @for (job of jobs; track job.id) {
        <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-lg transition transform hover:-translate-y-1">

          <!-- Header -->
          <div class="flex items-start justify-between mb-3">
            <h3 class="text-lg font-semibold text-gray-800">{{ job.title }}</h3>
            <span
              class="text-xs font-medium px-3 py-1 rounded-full"
              [ngClass]="{
                'bg-yellow-100 text-yellow-700': job.status === 'pending',
                'bg-green-100 text-green-700': job.status === 'completed',
                'bg-blue-100 text-blue-700': job.status === 'inProgress',
                'bg-gray-100 text-gray-600': job.status === 'canceled'
              }"
            >
              {{ job.status }}
            </span>
          </div>

          <!-- Description -->
          <p class="text-sm text-gray-600 line-clamp-3 mb-4">{{ job.description }}</p>

          <!-- Footer -->
          <div class="flex items-center justify-between text-xs text-gray-500 border-t pt-3">
            <span class="font-medium">#{{ job.id }}</span>
            <span>{{ job.createdAt | date:'mediumDate' }}</span>
          </div>

        </div>
      }

    </div>
  }

</div>

<div class="flex flex-col gap-[16px] items-center" *transloco="let t">
  <div>
    <h1 class="font-h1">
      {{ t('features.home.popularDesigns.title') }}
    </h1>
  </div>

  <div class="w-full">
    <z-carousel [zOptions]="zardCarouselOptions" zControls="none">
      <z-carousel-content class="flex">
        @for (product of products(); track product.id) {
          <z-carousel-item class="basis-full sm:basis-1/2 md:basis-1/3 lg:basis-1/4 flex-shrink-0 p-2 flex">
            <woodia-product-card
              [product]="product"
              class="w-full h-full flex"
            ></woodia-product-card>
          </z-carousel-item>
        }
      </z-carousel-content>
    </z-carousel>
  </div>
</div>

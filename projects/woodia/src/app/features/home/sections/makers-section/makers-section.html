<div class="flex flex-col gap-[24px]" *transloco="let t">
  <z-carousel [zOptions]="zardCarouselOptions" zControls="none">
    <z-carousel-content>

      @for (maker of makers; track maker.id; let i = $index) {
        <z-carousel-item class="!basis-auto">
          <woodia-maker-card [maker]="maker" />
        </z-carousel-item>

      }
    </z-carousel-content>
  </z-carousel>

  <div class="flex flex-col gap-[24px] items-center">
    <!-- Header -->
    <div class="flex flex-col items-center text-center max-w-[720px]">
      <h1 class="font-h1">
        {{ t('features.home.makers.title') }}
      </h1>

      <span class="font-caption text-foreground/50">
        {{ t('features.home.makers.description') }}
      </span>
    </div>

    <!-- CTA Button -->
    <z-button
      zSize="xl"
      class="rounded-full"
      (click)="navigateToAuth()"
    >
      {{ t('features.home.makers.joinNow') }}
    </z-button>
  </div>
</div>
